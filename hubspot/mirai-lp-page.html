<!doctype html>
<html lang="{{ html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{ standard_header_includes }}
  <link rel="icon" type="image/png" href="https://kojozcodes.github.io/mirai/assets/img/favicon.png?v=1" />
  <link rel="shortcut icon" href="https://kojozcodes.github.io/mirai/favicon.ico?v=1" />
  <link rel="apple-touch-icon" href="https://kojozcodes.github.io/mirai/assets/img/apple-touch-icon.png?v=1" />
  <style>
    /* full-bleed LP: drop the default page container/margins so the module's
       own full-width sections render edge-to-edge */
    body { margin: 0; padding: 0; }
    .body-wrapper, .body-container, .body-container__inner, .container-fluid,
    .row-fluid-wrapper, .row-fluid { max-width: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; }
  </style>
</head>
<body>
  {% module "mirai_lp" path="/mirai-lp.module" %}
  {{ standard_footer_includes }}
</body>
</html>
